<article class="post-card">
  <div class="post-card-content">
    <h3 class="post-card-title">
      <a href="{{ include.post.url | relative_url }}">{{ include.post.title }}</a>
    </h3>
    <div class="post-card-meta">
      <time datetime="{{ include.post.date | date_to_xmlschema }}">
        {{ include.post.date | date: "%Y-%m-%d" }}
      </time>
      {% if include.post.categories %}
      <span class="post-card-categories">
        {% for category in include.post.categories %}
        <a href="{{ '/blog/?category=' | append: category | relative_url }}" class="category-tag category-tag-sm">{{ category }}</a>
        {% endfor %}
      </span>
      {% endif %}
    </div>
    {% if include.post.excerpt %}
    <p class="post-card-excerpt">{{ include.post.excerpt | strip_html | truncate: 150 }}</p>
    {% endif %}
    <a href="{{ include.post.url | relative_url }}" class="post-card-link">阅读全文 →</a>
  </div>
</article>
